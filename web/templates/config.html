{{template "layout.html" .}}
{{define "title"}}系统配置 - FLS{{end}}
{{define "content"}}
<h1>系统配置</h1>

{{if .Flash}}
<p id="flash" style="color: #090; font-weight: bold; padding: 0.5em; background: #efe; border-radius: 4px;">{{.Flash}}</p>
{{end}}

<form method="POST" action="/admin/config">
    <label for="max_upload_size">最大上传大小 (bytes)</label>
    <input type="number" id="max_upload_size" name="max_upload_size" value="{{.MaxUploadSize}}" step="1">
    <small>当前: {{.MaxUploadSize | bytes}}，10GB 默认</small>

    <label for="token_length">Token 长度</label>
    <input type="number" id="token_length" name="token_length" value="{{.TokenLength}}" min="4" max="32">
    <small>默认: 8</small>

    <label for="default_expiry">默认分享过期时间</label>
    <select id="default_expiry" name="default_expiry">
        <option value="1h" {{if eq .DefaultExpiry.String "1h0m0s"}}selected{{end}}>1 小时</option>
        <option value="6h" {{if eq .DefaultExpiry.String "6h0m0s"}}selected{{end}}>6 小时</option>
        <option value="24h" {{if eq .DefaultExpiry.String "24h0m0s"}}selected{{end}}>24 小时</option>
        <option value="168h" {{if eq .DefaultExpiry.String "168h0m0s"}}selected{{end}}>7 天 (默认)</option>
        <option value="720h" {{if eq .DefaultExpiry.String "720h0m0s"}}selected{{end}}>30 天</option>
        <option value="8760h" {{if eq .DefaultExpiry.String "8760h0m0s"}}selected{{end}}>365 天</option>
        <option value="never" {{if eq .DefaultExpiry.String "0s"}}selected{{end}}>永不过期</option>
    </select>

    <label for="session_timeout">会话超时时间</label>
    <select id="session_timeout" name="session_timeout">
        <option value="1h" {{if eq .SessionTimeout.String "1h0m0s"}}selected{{end}}>1 小时</option>
        <option value="6h" {{if eq .SessionTimeout.String "6h0m0s"}}selected{{end}}>6 小时</option>
        <option value="24h" {{if eq .SessionTimeout.String "24h0m0s"}}selected{{end}}>24 小时 (默认)</option>
        <option value="168h" {{if eq .SessionTimeout.String "168h0m0s"}}selected{{end}}>7 天</option>
    </select>

    <label for="log_retention_days">日志保留天数</label>
    <input type="number" id="log_retention_days" name="log_retention_days" value="{{.LogRetentionDays}}" min="0">
    <small>0 = 永久保留，默认: 90</small>

    <label for="rate_limit_per_minute">速率限制 (请求/分钟)</label>
    <input type="number" id="rate_limit_per_minute" name="rate_limit_per_minute" value="{{.RateLimitPerMinute}}" min="1">
    <small>默认: 60</small>

    <fieldset>
        <legend>只读配置</legend>
        <p><strong>服务端口:</strong> {{.Port}} <span style="color: #888;">(端口修改需要重启服务)</span></p>
        <p><strong>数据目录:</strong> {{.DataDir}}</p>
    </fieldset>

    <button type="submit">保存配置</button>
</form>
{{end}}
