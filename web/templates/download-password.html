{{template "layout.html" .}}
{{define "title"}}输入密码 - FLS{{end}}
{{define "content"}}
<div class="card download-card text-center">
    <h1 class="mb-lg">需要密码</h1>
    <p class="text-muted mb-lg">该分享链接受密码保护，请输入密码以继续。</p>
    {{if .Error}}
    <div class="text-danger mb-md">{{.Error}}</div>
    {{end}}
    <form action="/s/{{.Token}}" method="POST" class="text-left password-form">
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autofocus placeholder="请输入访问密码">
        </div>
        <div class="form-actions mt-lg">
            <button type="submit" class="btn btn-primary">验证密码</button>
        </div>
    </form>
</div>
{{end}}
