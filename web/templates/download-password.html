{{template "layout.html" .}}
{{define "title"}}输入密码 - FLS{{end}}
{{define "content"}}
<div class="container" style="max-width: 400px; margin: 0 auto;">
    <h1>需要密码</h1>
    <p>该分享链接受密码保护，请输入密码以继续。</p>
    {{if .Error}}
    <div class="notice error" style="color: #c00; margin-bottom: 1em;">{{.Error}}</div>
    {{end}}
    <form action="/s/{{.Token}}" method="POST">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autofocus>
        <button type="submit">验证</button>
    </form>
</div>
{{end}}
