{{template "layout.html" .}}
{{define "title"}}输入密码 - FLS{{end}}
{{define "content"}}
<div class="download-wrapper">
<div class="card download-card">
    <div class="download-icon-lg">🔒</div>
    <h3 class="download-heading">需要密码</h3>
    <p class="text-muted download-meta">该分享受密码保护，请输入密码以继续。</p>
    {{if .Error}}
    <div class="flash flash-error text-left">{{.Error}}</div>
    {{end}}
    <form action="/s/{{.Token}}" method="POST" class="password-form text-left">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autofocus placeholder="请输入访问密码">
        </div>
        <button type="submit" class="btn btn-primary w-full">验证密码</button>
    </form>
</div>
</div>
{{end}}
