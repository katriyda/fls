{{template "layout.html" .}}
{{define "title"}}输入密码 - FLS{{end}}
{{define "content"}}
<div class="container">
    <h1>需要密码</h1>
    <div class="card text-center">
        <p class="text-muted mb-lg">该分享链接受密码保护，请输入密码以继续。</p>
        {{if .Error}}
        <div class="text-danger mb-md">{{.Error}}</div>
        {{end}}
        <form action="/s/{{.Token}}" method="POST" class="text-left" style="max-width: 320px; margin: 0 auto;">
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autofocus placeholder="请输入访问密码">
            </div>
            <div class="form-actions mt-lg">
                <button type="submit" class="btn btn-primary" style="width: 100%;">验证密码</button>
            </div>
        </form>
    </div>
</div>
{{end}}
