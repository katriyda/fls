{{template "layout.html" .}}
{{define "title"}}图片预览 - FLS{{end}}
{{define "content"}}
<div class="download-wrapper">
<div class="card download-card-wide">
    <h3 class="download-heading">{{.FileName}}</h3>
    <p class="text-muted download-meta">大小: {{.Size | bytes}} · 类型: {{.MimeType}}</p>
    <div class="image-preview-container mb-lg">
        <img src="/s/{{.Token}}/raw" alt="{{.FileName}}" loading="lazy">
    </div>
    <a href="/s/{{.Token}}/download" class="btn btn-primary">下载图片</a>
</div>
</div>
{{end}}
