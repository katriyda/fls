<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}FLS - 文件分享系统{{end}}</title>
    <link rel="stylesheet" href="/static/custom.css?v=6.0.4">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/tus.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (currentPath.startsWith(href) && href !== '/admin/' && href !== '/logout')) {
                    link.classList.add('active');
                } else if (href === '/admin/' && (currentPath === '/admin' || currentPath === '/admin/')) {
                    link.classList.add('active');
                }
            });

            document.body.addEventListener('htmx:configRequest', (event) => {
                const match = document.cookie.match(new RegExp('(^| )XSRF-TOKEN=([^;]+)'));
                if (match) {
                    event.detail.headers['X-CSRF-Token'] = decodeURIComponent(match[2]);
                }
            });
        });
    </script>
</head>
<body>
    <main class="{{if .Authenticated}}admin-mode{{end}}">
        {{if .Authenticated}}
        <header>
            <nav class="main-nav">
                <ul>
                    <li><a href="/admin/" class="nav-brand">▣ FLS</a></li>
                    <li><a href="/admin/" class="nav-link" data-page="dashboard">仪表盘</a></li>
                    <li><a href="/admin/files" class="nav-link" data-page="files">文件</a></li>
                    <li><a href="/admin/shares" class="nav-link" data-page="shares">分享</a></li>
                    <li><a href="/admin/config" class="nav-link" data-page="config">配置</a></li>
                    <li><form method="POST" action="/logout" style="display:inline"><input type="hidden" name="csrf_token" value="{{.CSRFToken}}"><button type="submit" class="nav-link nav-btn">登出</button></form></li>
                </ul>
            </nav>
        </header>
        {{end}}
        <section>
            {{block "content" .}}{{end}}
        </section>
        {{if .Authenticated}}
        <footer>
            <p>FLS — File Sharing System</p>
        </footer>
        {{end}}
    </main>
</body>
</html>
