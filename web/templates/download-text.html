{{template "layout.html" .}}
{{define "title"}}文本内容 - FLS{{end}}
{{define "content"}}
<div class="container" style="max-width: 800px; margin: 0 auto;">
    <h1>文本内容</h1>
    <div style="margin-bottom: 1em;">
        <a href="/s/{{.Token}}/download" class="button" role="button" style="display: inline-block; padding: 0.5em 1em;">下载为 .txt</a>
        <button onclick="copyText()" style="margin-left: 0.5em; padding: 0.5em 1em;">复制文本</button>
    </div>
    {{if gt .Size 102400}}
    <details>
        <summary>点击查看文本内容 ({{.Size | bytes}})</summary>
        <pre style="white-space: pre-wrap; word-break: break-word; background: #f5f5f5; padding: 1em; border-radius: 4px; max-height: 80vh; overflow-y: auto;">{{.TextContent}}</pre>
    </details>
    {{else}}
    <pre style="white-space: pre-wrap; word-break: break-word; background: #f5f5f5; padding: 1em; border-radius: 4px; max-height: 80vh; overflow-y: auto;">{{.TextContent}}</pre>
    {{end}}
</div>
<script>
function copyText() {
    const text = {{.TextContent | printf "%q"}};
    navigator.clipboard.writeText(text).then(function() {
        alert('文本已复制到剪贴板');
    }).catch(function() {
        alert('复制失败，请手动选择后复制');
    });
}
</script>
{{end}}
