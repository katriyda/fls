{{template "layout.html" .}}
{{define "title"}}文本内容 - FLS{{end}}
{{define "content"}}
<div class="card download-card">
    <h3 class="mb-sm" style="word-break: break-all;">文本分享</h3>
    <p class="text-muted mb-md">大小: {{.Size | bytes}}</p>
    
    <div class="mb-lg">
        {{if gt .Size 102400}}
        <details>
            <summary>点击查看文本内容 ({{.Size | bytes}})</summary>
            <pre class="text-content text-left">{{.TextContent}}</pre>
        </details>
        {{else}}
        <pre class="text-content text-left">{{.TextContent}}</pre>
        {{end}}
    </div>
    
    <div class="flex justify-center gap-sm">
        <a href="/s/{{.Token}}/download" class="btn btn-primary" role="button">下载为 .txt</a>
        <button onclick="copyText()" class="btn">复制文本</button>
    </div>
</div>
<script>
function copyText() {
    const text = {{.TextContent | printf "%q"}};
    navigator.clipboard.writeText(text).then(function() {
        alert('文本已复制到剪贴板');
    }).catch(function() {
        alert('复制失败，请手动选择后复制');
    });
}
</script>
{{end}}
