{{template "layout.html" .}}
{{define "title"}}下载文件 - FLS{{end}}
{{define "content"}}
<div class="container">
    <h1>下载文件</h1>
    <div class="card text-center">
        <div class="file-icon" style="font-size: 3.5rem; margin-bottom: var(--space-sm);">📄</div>
        <h3 style="margin-bottom: var(--space-xs); word-break: break-all;">{{.FileName}}</h3>
        <p class="text-muted" style="margin-bottom: var(--space-lg);">大小: {{.Size | bytes}} | 类型: {{.MimeType}}</p>
        <div class="flex justify-center">
            <a href="/s/{{.Token}}/download" class="btn btn-primary" role="button">下载文件</a>
        </div>
    </div>
</div>
{{end}}
