{{template "layout.html" .}}
{{define "title"}}下载文件 - FLS{{end}}
{{define "content"}}
<div class="download-wrapper">
<div class="card download-card">
    <div class="file-icon">📄</div>
    <h3 class="download-heading">{{.FileName}}</h3>
    <p class="text-muted download-meta">大小: {{.Size | bytes}} · 类型: {{.MimeType}}</p>
    <a href="/s/{{.Token}}/download" class="btn btn-primary download-btn-primary">下载文件</a>
</div>
</div>
{{end}}
