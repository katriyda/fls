name: Deploy FLS

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Linux amd64
        run: go build -ldflags '-s -w' -o dist/fls-linux-amd64 .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: fls-linux-amd64
          path: dist/fls-linux-amd64

      - name: Deploy to VPS
        env:
          SSH_HOST: ml.281718.xyz
          SSH_PORT: 29860
          SSH_USER: katr
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new \
              -p $SSH_PORT $SSH_USER@$SSH_HOST "exit" 2>/dev/null || true
          scp -P $SSH_PORT -i ~/.ssh/deploy_key \
              dist/fls-linux-amd64 \
              $SSH_USER@$SSH_HOST:/home/katr/fls/fls-linux-amd64.new
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST "
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            chmod +x /home/katr/fls/fls-linux-amd64.new
            mv /home/katr/fls/fls-linux-amd64.new /home/katr/fls/fls-linux-amd64
            systemctl --user restart fls
          "
